<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esfera 3D Flutuante — Azulejos & Luzes Dinâmicas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            background: #050505;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            pointer-events: none;
            z-index: 10;
        }
        #info h1 {
            font-size: 18px;
            font-weight: 300;
            margin-bottom: 6px;
            letter-spacing: 1px;
            color: #fff;
        }
        #info p {
            line-height: 1.5;
        }
    </style>
<base target="_blank">
</head>
<body>
    <div id="info">
        <h1>Esfera Flutuante 3D</h1>
        <p>Arraste para rotacionar a câmera<br>Scroll para zoom</p>
    </div>

    <!-- Three.js via CDN -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ─── CENA ───
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x080808);
        scene.fog = new THREE.Fog(0x080808, 8, 30);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 4, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.1;
        document.body.appendChild(renderer.domElement);

        // ─── CONTROLES ───
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 3;
        controls.maxDistance = 20;
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // não passar do chão
        controls.target.set(0, 1, 0);

        // ─── CHÃO DE AZULEJOS PRETO E BRANCO ───
        const tileSize = 1.0;
        const tilesX = 16;
        const tilesZ = 16;
        const floorGroup = new THREE.Group();

        const tileGeo = new THREE.PlaneGeometry(tileSize, tileSize);
        tileGeo.rotateX(-Math.PI / 2);

        const whiteMat = new THREE.MeshStandardMaterial({
            color: 0xeeeeee,
            roughness: 0.15,
            metalness: 0.05
        });
        const blackMat = new THREE.MeshStandardMaterial({
            color: 0x111111,
            roughness: 0.15,
            metalness: 0.05
        });

        for (let x = -tilesX / 2; x < tilesX / 2; x++) {
            for (let z = -tilesZ / 2; z < tilesZ / 2; z++) {
                const isWhite = (x + z) % 2 === 0;
                const tile = new THREE.Mesh(tileGeo, isWhite ? whiteMat : blackMat);
                tile.position.set(x * tileSize + tileSize / 2, 0, z * tileSize + tileSize / 2);
                tile.receiveShadow = true;
                floorGroup.add(tile);
            }
        }
        scene.add(floorGroup);

        // Rejunte (linhas entre azulejos) — visual sutil
        const gridHelper = new THREE.GridHelper(tilesX * tileSize, tilesX, 0x333333, 0x333333);
        gridHelper.position.y = 0.001;
        scene.add(gridHelper);

        // ─── ESFERA FLUTUANTE ───
        const sphereGeo = new THREE.SphereGeometry(1, 64, 64);
        const sphereMat = new THREE.MeshPhysicalMaterial({
            color: 0x4488ff,
            metalness: 0.6,
            roughness: 0.2,
            clearcoat: 1.0,
            clearcoatRoughness: 0.1,
            reflectivity: 1.0,
            envMapIntensity: 1.0
        });
        const sphere = new THREE.Mesh(sphereGeo, sphereMat);
        sphere.position.set(0, 2, 0);
        sphere.castShadow = true;
        sphere.receiveShadow = true;
        scene.add(sphere);

        // Anel decorativo ao redor da esfera
        const ringGeo = new THREE.TorusGeometry(1.4, 0.03, 16, 100);
        const ringMat = new THREE.MeshStandardMaterial({
            color: 0xffaa00,
            emissive: 0xff4400,
            emissiveIntensity: 0.5,
            metalness: 0.9,
            roughness: 0.1
        });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.position.copy(sphere.position);
        ring.rotation.x = Math.PI / 2;
        scene.add(ring);

        // ─── LUZES DINÂMICAS ───
        // 1. Luz ambiente suave
        const ambientLight = new THREE.AmbientLight(0x222244, 0.4);
        scene.add(ambientLight);

        // 2. Luz direcional principal (sol/moon) com sombras
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 30;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        dirLight.shadow.bias = -0.0005;
        dirLight.shadow.radius = 4;
        scene.add(dirLight);

        // 3. Luz pontual vermelha orbitando
        const pointLight1 = new THREE.PointLight(0xff3333, 80, 15);
        pointLight1.castShadow = true;
        pointLight1.shadow.mapSize.width = 1024;
        pointLight1.shadow.mapSize.height = 1024;
        pointLight1.shadow.bias = -0.001;
        scene.add(pointLight1);

        // 4. Luz pontual azul orbitando em sentido contrário
        const pointLight2 = new THREE.PointLight(0x33aaff, 80, 15);
        pointLight2.castShadow = true;
        pointLight2.shadow.mapSize.width = 1024;
        pointLight2.shadow.mapSize.height = 1024;
        pointLight2.shadow.bias = -0.001;
        scene.add(pointLight2);

        // 5. Luz pontual verde/amarela de baixo
        const pointLight3 = new THREE.PointLight(0xffaa00, 40, 10);
        pointLight3.position.set(0, 0.5, 0);
        pointLight3.castShadow = true;
        scene.add(pointLight3);

        // ─── ENVMAP (reflexões) ───
        // Criar um cubemap procedural simples para reflexões realistas na esfera
        const pmremGenerator = new THREE.PMREMGenerator(renderer);
        pmremGenerator.compileEquirectangularShader();

        const envScene = new THREE.Scene();
        envScene.background = new THREE.Color(0x111122);
        const envLight1 = new THREE.PointLight(0xffffff, 500);
        envLight1.position.set(10, 10, 10);
        envScene.add(envLight1);
        const envLight2 = new THREE.PointLight(0xff4444, 300);
        envLight2.position.set(-10, 5, -10);
        envScene.add(envLight2);
        const envLight3 = new THREE.PointLight(0x4444ff, 300);
        envLight3.position.set(0, -5, 10);
        envScene.add(envLight3);

        const cubeRenderTarget = pmremGenerator.fromScene(envScene, 0.04);
        scene.environment = cubeRenderTarget.texture;
        pmremGenerator.dispose();

        // ─── ANIMAÇÃO ───
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();

            // Esfera flutuando (bobbing)
            sphere.position.y = 2 + Math.sin(t * 1.5) * 0.3;
            sphere.rotation.y = t * 0.3;
            sphere.rotation.x = Math.sin(t * 0.5) * 0.1;

            // Anel acompanha a esfera
            ring.position.y = sphere.position.y;
            ring.rotation.z = t * 0.5;
            ring.rotation.x = Math.PI / 2 + Math.sin(t * 0.8) * 0.2;

            // Luz vermelha orbitando horizontalmente
            pointLight1.position.x = Math.cos(t * 0.7) * 4;
            pointLight1.position.z = Math.sin(t * 0.7) * 4;
            pointLight1.position.y = 3 + Math.sin(t * 1.2) * 1;

            // Luz azul orbitando em sentido contrário, mais alta
            pointLight2.position.x = Math.cos(-t * 0.5 + Math.PI) * 5;
            pointLight2.position.z = Math.sin(-t * 0.5 + Math.PI) * 5;
            pointLight2.position.y = 4 + Math.cos(t * 0.9) * 1;

            // Luz de baixo pulsa
            pointLight3.intensity = 30 + Math.sin(t * 3) * 15;
            pointLight3.position.x = Math.sin(t * 0.3) * 1;
            pointLight3.position.z = Math.cos(t * 0.3) * 1;

            // Luz direcional se move levemente
            dirLight.position.x = 5 + Math.sin(t * 0.2) * 2;
            dirLight.position.z = 5 + Math.cos(t * 0.2) * 2;

            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        // ─── RESPONSIVO ───
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
